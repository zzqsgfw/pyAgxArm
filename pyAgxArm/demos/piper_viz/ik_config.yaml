# IK solver parameters

# Workspace shell radii (meters)
workspace:
  r_min: 0.08
  r_max: 0.55

# One-shot solve (initial convergence)
oneshot:
  n_steps: 200
  lr: 0.05
  pos_weight: 50.0
  rot_weight: 1.0
  limit_weight: 10.0

# Incremental solve (per-frame warm-start)
incremental:
  n_steps: 10
  lr: 0.05
  pos_weight: 50.0
  rot_weight: 5.0
  smooth_weight: 1.0
  limit_weight: 0.0
  momentum_reset_threshold: 0.05  # meters, reset Adam state on jumps > this
